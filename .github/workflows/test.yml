name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  security-scan:
    name: Security Scan (sample policies)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Run analyzer on sample policies
        run: |
          echo "Analizando data/sample_policies.json..."
          python main.py -f data/sample_policies.json --output console || true
          echo ""
          echo "Nota: los hallazgos críticos en este repo son intencionales (datos de demo)."
          echo "En el repo de tu app real, reemplazá '|| true' por 'exit \$?' para bloquear deploys inseguros."

  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: [unit-tests, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Package Lambda
        run: |
          zip -r dist/lambda_package.zip \
            lambda_function.py \
            analyzer/ \
            reporter/ \
            -x "**/__pycache__/*" \
            -x "**/*.pyc"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name iam-policy-analyzer \
            --zip-file fileb://dist/lambda_package.zip \
            --query '[FunctionName, CodeSize, LastModified]' \
            --output table
