name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  security-scan:
    name: Security Scan (sample policies)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Run analyzer on sample policies
        run: |
          echo "Analizando data/sample_policies.json..."
          python main.py -f data/sample_policies.json --output console
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 1 ]; then
            echo ""
            echo "Se detectaron hallazgos CRÍTICOS en las políticas de ejemplo."
            echo "En un pipeline real esto bloquearía el deploy."
            exit 1
          fi
