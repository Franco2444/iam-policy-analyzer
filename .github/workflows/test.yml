name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  security-scan:
    name: Security Scan (sample policies)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3

      - name: Run analyzer on sample policies
        run: |
          echo "Analizando data/sample_policies.json..."
          python main.py -f data/sample_policies.json --output console || true
          echo ""
          echo "Nota: los hallazgos críticos en este repo son intencionales (datos de demo)."
          echo "En el repo de tu app real, reemplazá '|| true' por 'exit \$?' para bloquear deploys inseguros."
